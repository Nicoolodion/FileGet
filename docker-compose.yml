services:
  plex-get:
    build: .
    image: plex-get:latest
    container_name: plex-get
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
    # The HOST_*_PATH variables below are bind-mounted into the container.
    # Edit those values in .env (or override here). The container paths
    volumes:
      - ./data:/app/data
      - ${HOST_MEDIA_PATH_MOVIES}:/media/Movies
      - ${HOST_MEDIA_PATH_SERIES}:/media/Series
      - ${HOST_MEDIA_PATH_ANIME_MOVIES}:/media/Anime-Movies
      - ${HOST_MEDIA_PATH_ANIME_SERIES}:/media/Anime-Series
      - ${HOST_MEDIA_PATH_UNCATEGORIZED}:/media/Uncategorized
      - ${HOST_TEMP_PATH}:/temp
    ports:
      - "${WEB_PORT:-8000}:8000"
